<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常记账收支小工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: clamp(20px, 4vw, 28px);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: clamp(13px, 2vw, 15px);
        }

        .month-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px 20px 0;
            background: #f8f9fa;
        }

        .month-selector button {
            width: 40px;
            height: 40px;
            border: none;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-selector button:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .month-selector button:active {
            transform: scale(0.95);
        }

        .month-selector .current-month {
            font-size: clamp(16px, 3vw, 20px);
            font-weight: 600;
            color: #333;
            min-width: 120px;
            text-align: center;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 25px 20px 30px;
            background: #f8f9fa;
        }

        .summary-card {
            background: white;
            padding: 18px 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s;
        }

        .summary-card:hover {
            transform: translateY(-2px);
        }

        .summary-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .summary-card h3 {
            font-size: clamp(12px, 2vw, 14px);
            color: #666;
            font-weight: 500;
        }

        .summary-label .count {
            font-size: 11px;
            color: #999;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .summary-card .amount {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: bold;
        }

        .income .amount {
            color: #10b981;
        }

        .expense .amount {
            color: #ef4444;
        }

        .balance .amount {
            color: #3b82f6;
        }

        .form-section {
            padding: 30px 25px;
            border-bottom: 1px solid #eee;
        }

        .form-section h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: clamp(16px, 3vw, 20px);
            font-weight: 600;
        }

        .type-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .type-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .type-btn.active.income {
            background: #d1fae5;
            border-color: #10b981;
            color: #059669;
        }

        .type-btn.active.expense {
            background: #fee2e2;
            border-color: #ef4444;
            color: #dc2626;
        }

        .type-btn:hover:not(.active) {
            border-color: #667eea;
            color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error,
        .form-group select.error,
        .form-group textarea.error {
            border-color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #10b981;
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 1000;
            font-weight: 500;
            max-width: 300px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #ef4444;
        }

        .list-section {
            padding: 30px 25px;
        }

        .list-section h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: clamp(16px, 3vw, 20px);
            font-weight: 600;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            background: #f9fafb;
            transition: all 0.3s;
            gap: 12px;
        }

        .transaction-item:hover {
            background: #f3f4f6;
            transform: translateX(2px);
        }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-category {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            font-size: 15px;
        }

        .transaction-description {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .transaction-date {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }

        .transaction-amount {
            font-size: clamp(16px, 3vw, 20px);
            font-weight: bold;
            white-space: nowrap;
        }

        .transaction-amount.income {
            color: #10b981;
        }

        .transaction-amount.expense {
            color: #ef4444;
        }

        .delete-btn {
            padding: 8px 14px;
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            font-weight: 500;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: #fecaca;
            transform: scale(1.02);
        }

        .delete-btn:active {
            transform: scale(0.98);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #888;
        }

        .empty-state svg {
            width: 70px;
            height: 70px;
            margin-bottom: 15px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 15px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px 5px;
            }

            .summary {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 20px 15px 25px;
            }

            .summary-card {
                padding: 15px;
            }

            .form-section,
            .list-section {
                padding: 25px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
                margin-bottom: 0;
            }

            .transaction-item {
                padding: 12px;
            }

            .delete-btn {
                padding: 6px 10px;
                font-size: 12px;
            }

            .toast {
                left: 20px;
                right: 20px;
                max-width: none;
                text-align: center;
            }
        }

        @media (max-width: 400px) {
            .header {
                padding: 25px 15px;
            }

            .form-section,
            .list-section {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <h1>💰 日常记账收支小工具</h1>
            <p>轻松记录每一笔收支，掌控财务状况</p>
        </div>

        <div class="month-selector">
            <button onclick="changeMonth(-1)" aria-label="上一月">‹</button>
            <span class="current-month" id="currentMonthDisplay">2026年5月</span>
            <button onclick="changeMonth(1)" aria-label="下一月">›</button>
        </div>
        <div class="summary">
            <div class="summary-card income">
                <div class="summary-label">
                    <h3>本月收入</h3>
                    <span class="count" id="incomeCount">0笔</span>
                </div>
                <div class="amount">¥<span id="totalIncome">0.00</span></div>
            </div>
            <div class="summary-card expense">
                <div class="summary-label">
                    <h3>本月支出</h3>
                    <span class="count" id="expenseCount">0笔</span>
                </div>
                <div class="amount">¥<span id="totalExpense">0.00</span></div>
            </div>
            <div class="summary-card balance">
                <div class="summary-label">
                    <h3>本月结余</h3>
                    <span class="count" id="totalCount">共0笔</span>
                </div>
                <div class="amount">¥<span id="balance">0.00</span></div>
            </div>
        </div>

        <div class="form-section">
            <h2>📝 添加记录</h2>
            <div class="type-toggle">
                <button class="type-btn expense active" data-type="expense" type="button">支出</button>
                <button class="type-btn income" data-type="income" type="button">收入</button>
            </div>
            <form id="transactionForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">分类</label>
                        <select id="category" required>
                            <option value="">请选择分类</option>
                        </select>
                        <div class="error-message" id="categoryError">请选择分类</div>
                    </div>
                    <div class="form-group">
                        <label for="amount">金额 (¥)</label>
                        <input type="number" id="amount" step="0.01" min="0.01" placeholder="请输入金额" required>
                        <div class="error-message" id="amountError">请输入有效的金额</div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="date">日期</label>
                    <input type="date" id="date" required>
                    <div class="error-message" id="dateError">请选择日期</div>
                </div>
                <div class="form-group">
                    <label for="description">备注</label>
                    <textarea id="description" rows="2" placeholder="添加备注（可选）" maxlength="200"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">添加记录</button>
            </form>
        </div>

        <div class="list-section">
            <h2>📋 收支明细</h2>
            <div id="transactionList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                    <p>本月暂无记录，开始添加第一笔吧！</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentType = 'expense';
        const today = new Date();
        document.getElementById('date').value = today.toISOString().split('T')[0];

        let selectedYear = today.getFullYear();
        let selectedMonth = today.getMonth() + 1;
        let isSubmitting = false;

        const categories = {
            expense: ['餐饮', '交通', '购物', '娱乐', '医疗', '教育', '住房', '其他'],
            income: ['工资', '奖金', '兼职', '投资', '红包', '退款', '其他']
        };

        function updateMonthDisplay() {
            document.getElementById('currentMonthDisplay').textContent = 
                `${selectedYear}年${selectedMonth}月`;
        }

        function changeMonth(delta) {
            selectedMonth += delta;
            if (selectedMonth > 12) {
                selectedMonth = 1;
                selectedYear++;
            } else if (selectedMonth < 1) {
                selectedMonth = 12;
                selectedYear--;
            }
            updateMonthDisplay();
            loadMonthlySummary();
            loadTransactions();
        }

        function updateCategories() {
            const categorySelect = document.getElementById('category');
            categorySelect.innerHTML = '<option value="">请选择分类</option>' + 
                categories[currentType]
                    .map(cat => `<option value="${cat}">${cat}</option>`)
                    .join('');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function clearErrors() {
            document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
        }

        function showError(fieldId, errorId) {
            document.getElementById(fieldId).classList.add('error');
            document.getElementById(errorId).classList.add('show');
        }

        function validateAmount(amount) {
            if (!amount || isNaN(amount)) return false;
            if (amount <= 0) return false;
            if (amount > 99999999.99) return false;
            return true;
        }

        function validateDate(dateStr) {
            if (!dateStr) return false;
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return false;
            const minDate = new Date('1900-01-01');
            const maxDate = new Date('2100-12-31');
            return date >= minDate && date <= maxDate;
        }

        function sanitizeString(str, maxLength = 200) {
            if (!str) return '';
            return String(str).trim().substring(0, maxLength);
        }

        function setSubmitting(submitting) {
            isSubmitting = submitting;
            const btn = document.getElementById('submitBtn');
            btn.disabled = submitting;
            btn.textContent = submitting ? '提交中...' : '添加记录';
        }

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                updateCategories();
                clearErrors();
            });
        });

        document.getElementById('amount').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9.]/g, '');
            if (this.value.split('.').length > 2) {
                this.value = this.value.replace(/\.+$/, '');
            }
            if (this.value.includes('.') && this.value.split('.')[1].length > 2) {
                this.value = this.value.substring(0, this.value.indexOf('.') + 3);
            }
            if (this.value && !isNaN(parseFloat(this.value))) {
                this.classList.remove('error');
                document.getElementById('amountError').classList.remove('show');
            }
        });

        document.getElementById('category').addEventListener('change', function() {
            if (this.value) {
                this.classList.remove('error');
                document.getElementById('categoryError').classList.remove('show');
            }
        });

        document.getElementById('date').addEventListener('change', function() {
            if (this.value) {
                this.classList.remove('error');
                document.getElementById('dateError').classList.remove('show');
            }
        });

        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isSubmitting) return;
            
            clearErrors();
            
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const description = sanitizeString(document.getElementById('description').value, 200);
            
            let hasError = false;
            
            if (!category) {
                showError('category', 'categoryError');
                hasError = true;
            }
            
            if (!validateAmount(amount)) {
                showError('amount', 'amountError');
                hasError = true;
            }
            
            if (!validateDate(date)) {
                showError('date', 'dateError');
                hasError = true;
            }
            
            if (hasError) {
                showToast('请填写完整的信息', true);
                return;
            }
            
            const transaction = {
                type: currentType,
                category: category,
                amount: Math.round(amount * 100) / 100,
                date: date,
                description: description
            };

            setSubmitting(true);

            try {
                const response = await fetch('/api/transactions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(transaction),
                    timeout: 10000
                });

                if (response.ok) {
                    document.getElementById('transactionForm').reset();
                    document.getElementById('date').value = today.toISOString().split('T')[0];
                    updateCategories();
                    loadTransactions();
                    loadMonthlySummary();
                    showToast(`${currentType === 'income' ? '收入' : '支出'}记录添加成功！`);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    showToast(errorData.error || '添加失败，请重试', true);
                }
            } catch (error) {
                console.error('添加失败:', error);
                showToast('网络错误，请检查连接', true);
            } finally {
                setSubmitting(false);
            }
        });

        async function loadTransactions() {
            try {
                const response = await fetch('/api/transactions', { timeout: 10000 });
                let transactions = await response.json();
                
                const monthStr = `${selectedYear}-${String(selectedMonth).padStart(2, '0')}`;
                transactions = transactions.filter(t => t.date && t.date.startsWith(monthStr));
                
                const listEl = document.getElementById('transactionList');

                if (transactions.length === 0) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                            <p>本月暂无记录，开始添加第一笔吧！</p>
                        </div>
                    `;
                    return;
                }

                listEl.innerHTML = transactions.map(t => {
                    const amount = parseFloat(t.amount) || 0;
                    return `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="transaction-category">${escapeHtml(t.category || '未分类')}</div>
                            <div class="transaction-description">${escapeHtml(t.description || '无备注')}</div>
                            <div class="transaction-date">${escapeHtml(t.date || '')}</div>
                        </div>
                        <div class="transaction-amount ${t.type}">
                            ${t.type === 'income' ? '+' : '-'}¥${amount.toFixed(2)}
                        </div>
                        <button class="delete-btn" onclick="deleteTransaction(${t.id})">删除</button>
                    </div>
                `}).join('');
            } catch (error) {
                console.error('加载失败:', error);
                showToast('加载记录失败，请刷新页面重试', true);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadMonthlySummary() {
            try {
                const response = await fetch(
                    `/api/monthly-summary?year=${selectedYear}&month=${selectedMonth}`,
                    { timeout: 10000 }
                );
                const summary = await response.json();
                
                document.getElementById('totalIncome').textContent = 
                    (parseFloat(summary.income) || 0).toFixed(2);
                document.getElementById('totalExpense').textContent = 
                    (parseFloat(summary.expense) || 0).toFixed(2);
                document.getElementById('balance').textContent = 
                    (parseFloat(summary.balance) || 0).toFixed(2);
                
                document.getElementById('incomeCount').textContent = 
                    `${summary.incomeCount || 0}笔`;
                document.getElementById('expenseCount').textContent = 
                    `${summary.expenseCount || 0}笔`;
                document.getElementById('totalCount').textContent = 
                    `共${summary.totalCount || 0}笔`;
            } catch (error) {
                console.error('加载月度汇总失败:', error);
            }
        }

        async function deleteTransaction(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            try {
                const response = await fetch(`/api/transactions/${id}`, {
                    method: 'DELETE',
                    timeout: 10000
                });

                if (response.ok) {
                    loadTransactions();
                    loadMonthlySummary();
                    showToast('记录删除成功');
                } else {
                    showToast('删除失败，请重试', true);
                }
            } catch (error) {
                console.error('删除失败:', error);
                showToast('网络错误，请检查连接', true);
            }
        }

        updateMonthDisplay();
        updateCategories();
        loadTransactions();
        loadMonthlySummary();
    </script>
</body>
</html>
