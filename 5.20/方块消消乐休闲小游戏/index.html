<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方块消消乐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="header-top">
                <h1 class="game-title">方块消消乐</h1>
                <button class="sound-btn" id="soundBtn">🔊</button>
            </div>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">得分</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="label">目标</span>
                    <span class="value" id="targetScore">0</span>
                </div>
                <div class="score-item">
                    <span class="label">关卡</span>
                    <span class="value" id="currentLevel">1</span>
                </div>
            </div>
        </div>
        
        <div class="game-main">
            <div class="start-screen" id="startScreen">
                <div class="start-content">
                    <h2>欢迎来到方块消消乐</h2>
                    <p class="game-rules">
                        游戏规则：<br>
                        点击相邻的同色方块进行消除<br>
                        消除的方块越多，得分越高<br>
                        达到目标分数即可通关
                    </p>
                    <div class="main-buttons">
                        <button class="start-btn" id="startBtn">开始游戏</button>
                        <button class="level-btn" id="levelSelectBtn">选择关卡</button>
                    </div>
                </div>
            </div>
            
            <div class="level-screen" id="levelScreen" style="display: none;">
                <div class="level-content">
                    <h2>选择关卡</h2>
                    <div class="level-grid" id="levelGrid"></div>
                    <button class="control-btn" id="backToStartBtn">返回</button>
                </div>
            </div>
            
            <div class="game-screen" id="gameScreen" style="display: none;">
                <div class="combo-display" id="combo" style="display: none;"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="game-board" id="gameBoard"></div>
                <div class="game-controls">
                    <button class="control-btn" id="restartBtn">重新开始</button>
                    <button class="control-btn" id="menuBtn">返回菜单</button>
                </div>
            </div>
            
            <div class="level-complete-screen" id="levelCompleteScreen" style="display: none;">
                <div class="level-complete-content">
                    <h2>🎉 恭喜过关！</h2>
                    <p class="level-info">第 <span id="completedLevel">1</span> 关</p>
                    <p class="final-score">得分: <span id="levelScore">0</span></p>
                    <div class="stars" id="stars">
                        <span class="star">⭐</span>
                        <span class="star">⭐</span>
                        <span class="star">⭐</span>
                    </div>
                    <div class="game-over-buttons">
                        <button class="control-btn" id="nextLevelBtn">下一关</button>
                        <button class="control-btn" id="levelCompleteMenuBtn">返回菜单</button>
                    </div>
                </div>
            </div>
            
            <div class="game-over-screen" id="gameOverScreen" style="display: none;">
                <div class="game-over-content">
                    <h2>游戏结束</h2>
                    <p class="level-info">第 <span id="failedLevel">1</span> 关</p>
                    <p class="final-score">最终得分: <span id="finalScore">0</span></p>
                    <p class="target-info">目标分数: <span id="failedTarget">0</span></p>
                    <div class="game-over-buttons">
                        <button class="control-btn" id="retryBtn">再试一次</button>
                        <button class="control-btn" id="homeBtn">返回主页</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
