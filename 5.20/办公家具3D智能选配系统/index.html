<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>办公家具3D智能选配系统</title>
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>办公家具3D智能选配系统</h1>
        </header>
        
        <div class="main-container">
            <aside class="sidebar">
                <div class="panel">
                    <h3>家具选择</h3>
                    <div class="furniture-list" id="furnitureList">
                    </div>
                </div>
                
                <div class="panel">
                    <h3>材质配置</h3>
                    <div class="material-options" id="materialOptions">
                    </div>
                </div>
            </aside>
            
            <main class="viewer">
                <div id="canvasContainer"></div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </main>
        </div>
    </div>
    
    <script type="module" src="./src/main.js"></script>
</body>
</html>
